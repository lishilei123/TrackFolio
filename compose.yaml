services:
  trackfolio:
    build:
      context: .
      target: app
    image: ${TRACKFOLIO_IMAGE:-trackfolio:local}
    environment:
      NODE_ENV: production
      PORT: "5174"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRACKFOLIO_DB: /data/trackfolio.sqlite
      TRACKFOLIO_PROVIDER: ${TRACKFOLIO_PROVIDER:-auto}
    volumes:
      - trackfolio-data:/data
    ports:
      - "${TRACKFOLIO_HTTP_PORT:-8080}:5174"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5174/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  trackfolio-data:
