name: Delete GitHub package

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type delete-trackfolio to confirm"
        required: true
        type: string
  push:
    tags:
      - "delete-package-*"

permissions:
  contents: read
  packages: write

jobs:
  delete:
    runs-on: ubuntu-latest

    steps:
      - name: Delete trackfolio package
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: trackfolio
          CONFIRM: ${{ github.event.inputs.confirm || '' }}
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" != "push" && "${CONFIRM}" != "delete-trackfolio" ]]; then
            echo "Confirmation text did not match."
            exit 1
          fi

          set +e
          output=$(gh api \
            --method DELETE \
            "/users/${OWNER}/packages/container/${PACKAGE_NAME}" \
            --silent 2>&1)
          status=$?
          set -e

          if [[ "${status}" -eq 0 ]]; then
            echo "Deleted ${OWNER}/${PACKAGE_NAME}."
            exit 0
          fi

          if grep -q "HTTP 404" <<< "${output}"; then
            echo "${OWNER}/${PACKAGE_NAME} is already absent."
            exit 0
          fi

          echo "${output}"
          exit "${status}"
